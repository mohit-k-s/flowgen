<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    
    <!-- Main gradient for the F shape -->
    <linearGradient id="mainGrad" x1="50" y1="40" x2="150" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="35%" stop-color="#4F46E5"/>
      <stop offset="70%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="url(#mainGrad)" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="200" height="200" fill="url(#grid)"/>

  <!-- Connection lines forming F shape -->
  <g opacity="0.6">
    <!-- Vertical line (left side of F) -->
    <line x1="60" y1="50" x2="60" y2="150" stroke="url(#mainGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Top horizontal line -->
    <line x1="60" y1="50" x2="140" y2="50" stroke="url(#mainGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    
    <!-- Middle horizontal line -->
    <line x1="60" y1="90" x2="120" y2="90" stroke="url(#mainGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <!-- Node circles forming the F -->
  <g filter="url(#glow)">
    <!-- Top-left corner node (start) -->
    <circle cx="60" cy="50" r="11" fill="#0EA5E9" opacity="0.2" stroke="#0EA5E9" stroke-width="2.5"/>
    <circle cx="60" cy="50" r="5" fill="#0EA5E9"/>
    
    <!-- Top-right node -->
    <circle cx="140" cy="50" r="11" fill="#4F46E5" opacity="0.2" stroke="#4F46E5" stroke-width="2.5"/>
    <circle cx="140" cy="50" r="5" fill="#4F46E5"/>
    
    <!-- Middle-left node -->
    <circle cx="60" cy="90" r="11" fill="#6366F1" opacity="0.2" stroke="#6366F1" stroke-width="2.5"/>
    <circle cx="60" cy="90" r="5" fill="#6366F1"/>
    
    <!-- Middle-right node -->
    <circle cx="120" cy="90" r="11" fill="#7C3AED" opacity="0.2" stroke="#7C3AED" stroke-width="2.5"/>
    <circle cx="120" cy="90" r="5" fill="#7C3AED"/>
    
    <!-- Bottom node -->
    <circle cx="60" cy="150" r="11" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="2.5"/>
    <circle cx="60" cy="150" r="5" fill="#059669"/>
  </g>
  
  <!-- Animated flow particles -->
  <g opacity="0.8">
    <circle cx="60" cy="50" r="2" fill="#0EA5E9">
      <animate attributeName="cy" values="50;150" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="50" r="2" fill="#4F46E5">
      <animate attributeName="cx" values="60;140" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="90" r="2" fill="#7C3AED">
      <animate attributeName="cx" values="60;120" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- ICS SkunkWorks branding -->
  <text x="100" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#6366F1" letter-spacing="0.5">ICS</text>
  <text x="100" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="600" fill="#94a3b8" letter-spacing="1.2" opacity="0.8">SKUNKWORKS</text>
</svg>
